<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - Nawab Foundation</title>
    <style>
        /* General styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #D9DCD6;
            color: #333;
            padding: 20px;
            text-align: center;
        }

        /* Header styling */
        header {
            background-color: #16425B;
            padding: 20px;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 1.8em;
            margin: 0;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }

        /* Content styling */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .content img {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
        }
        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            color: #fff;
            background-color: #16425B;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-button:hover {
            background-color: #0d2e42;
        }

        /* Footer styling */
        footer {
            margin-top: 30px;
            background-color: #333;
            color: white;
            padding: 15px;
            font-size: 0.9em;
            text-align: center;
            border-radius: 5px;
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5em;
            }
            nav {
                flex-direction: column;
                gap: 10px;
            }
            .content img {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>NAWAB FOUNDATION</h1>
        <nav>
            <a href="index.html" aria-label="Go to home page">Home</a>
            <a href="about.html" aria-label="Go to about us page">About Us</a>
            <a href="donate.html" aria-label="Go to donate page">Donate</a>
            <a href="contact.html" aria-label="Go to contact page">Contact</a>
        </nav>
    </header>

    <!-- Content -->
    <div class="content">
        <h1>Support Our Cause</h1>
        <p>Your contributions help us feed and care for stray and abandoned dogs.</p>
        <img src="k.jpg" alt="Support our cause">
        <p>Thank you for your kindness and generosity.</p>
        <a href="index.html" class="back-button">Go Back</a>
    </div>
    
    <!-- Footer -->
    <footer>
        <p>&copy; NAWAB FOUNDATION 2024. All rights reserved.</p>
    </footer>

</body>
</html>
